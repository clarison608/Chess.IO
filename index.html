<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>64-Player Grid Combat</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: sans-serif;
        }
        #game-container {
            /* This will hold the Pixi canvas */
        }
        @keyframes timer-shake {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(0px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(2px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(2px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        .shake-active {
            animation: timer-shake 0.4s infinite;
            color: #ff4444 !important; /* Flashes red */
            border-color: #ff4444 !important;
        }

        .active-info {
        display: block;
        font-size: 10px;
        color: #66AFFF; /* Bright Blue */
        margin-top: 4px;
        font-weight: bold;
    }
    </style>
    <script src="https://bundle.run/buffer@6.0.3"></script>
<script>
  window.Buffer = window.Buffer || buffer.Buffer;
  
  // CRITICAL: Manual fix for the isUtf8 error
  if (typeof window.Buffer.isUtf8 === 'undefined') {
    window.Buffer.isUtf8 = function(obj) {
      try {
        new TextDecoder('utf-8', { fatal: true }).decode(obj);
        return true;
      } catch (e) {
        return false;
      }
    };
  }

  window.process = {
    env: { NODE_ENV: 'production' },
    browser: true,
    version: '',
    nextTick: function (fn) { setTimeout(fn, 0); }
  };
</script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
    <script src="https://unpkg.com/colyseus.js@^0.15.0/dist/colyseus.js"></script>
    <script src="https://unpkg.com/@colyseus/sdk@0.17.0/dist/colyseus.js"></script>
    <script src="app.js"></script>
    
</head>
<body>
    <div id="login-ui" style="position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(20, 20, 20, 0.95); z-index: 100; display: flex; justify-content: center; align-items: center; flex-direction: column;">
        <h1 style="color: gold; margin-bottom: 30px; font-size: 3em; text-shadow: 0px 0px 10px rgba(255, 215, 0, 0.5);">GRID COMBAT</h1>
        <input type="text" id="nickname-input" placeholder="Enter your nickname..." maxlength="12" style="padding: 15px; font-size: 20px; border-radius: 8px; border: 2px solid white; background: #333; color: white; text-align: center; margin-bottom: 20px; width: 300px;">
        <button id="btn-join" style="padding: 15px 30px; font-size: 20px; font-weight: bold; background: #44aa44; color: white; border: none; border-radius: 8px; cursor: pointer; box-shadow: 0px 4px 0px #227722;">
            Deploy to Board
        </button>
    </div>
    <div id="leaderboard-ui" style="display: none; position: absolute; right: 20px; top: 20px; background: rgba(0, 0, 0, 0.85); border: 2px solid #555; border-radius: 8px; padding: 15px; color: white; font-family: sans-serif; min-width: 180px; z-index: 10; box-shadow: 0px 4px 10px rgba(0,0,0,0.5);">
        <h3 style="margin: 0 0 10px 0; border-bottom: 1px solid #777; padding-bottom: 5px; text-align: center; font-size: 16px; color: #ddd;">
            Turn Order & Territory
        </h3>
        <div id="leaderboard-content" style="display: flex; flex-direction: column; gap: 8px;">
            </div>
    </div>
    <div id="timer-ui" style="display: none; position: absolute; right: 230px; top: 20px; background: rgba(0, 0, 0, 0.85); border: 2px solid #555; border-radius: 8px; padding: 15px 25px; color: white; font-family: monospace; font-size: 32px; font-weight: bold; text-align: center; z-index: 10; box-shadow: 0px 4px 10px rgba(0,0,0,0.5);">
        00:30
    </div>
    <div id="game-container"></div>
    <div id="friendly-fire-ui" style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0, 0, 0, 0.85); border: 3px solid #ffaa00; border-radius: 8px; padding: 20px; text-align: center; color: white; font-family: sans-serif; z-index: 10; box-shadow: 0px 0px 20px rgba(0,0,0,1);">
        <h2 style="margin-top: 0; color: #ffaa00;">Ally Conflict!</h2>
        <p style="font-size: 18px;">Your ally's <b><span id="ff-piece"></span></b> is requesting to move to tile <b><span id="ff-coords"></span></b>.</p>
        <p>You are currently locked into this space. Do you yield to them, or hold your ground?</p>
        <div style="margin-top: 20px;">
            <button id="btn-yield" style="background: #ff4444; color: white; border: none; padding: 12px 24px; font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 4px; margin-right: 10px;">Yield Space</button>
            <button id="btn-hold" style="background: #44aa44; color: white; border: none; padding: 12px 24px; font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 4px;">Hold Ground</button>
        </div>
    </div>
    <div id="king-force-ui" style="display: none; position: absolute; top: 20%; left: 50%; transform: translateX(-50%); background: rgba(255, 0, 0, 0.9); padding: 20px; border: 4px solid white; color: white; text-align: center; z-index: 20; border-radius: 10px;">
    <h2 style="margin: 0;">KING'S COMMAND!</h2>
    <p>The King is forcing: <b id="force-action-text" style="color: gold;"></b></p>
    <div id="force-timer" style="font-size: 40px; font-weight: bold;">10</div>
    <button id="btn-veto" style="margin-top: 15px; padding: 10px 20px; background: white; color: red; font-weight: bold; cursor: pointer; border: none;">VETO COMMAND</button>
</div>
    <button id="btn-open-promote" style="display: none; position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); background: gold; color: black; font-size: 18px; font-weight: bold; padding: 12px 24px; border: 3px solid white; border-radius: 8px; cursor: pointer; z-index: 5; box-shadow: 0px 0px 15px gold;">
        PROMOTE PAWN!
    </button>

    <div id="promote-ui" style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0, 0, 0, 0.9); border: 3px solid gold; border-radius: 8px; padding: 20px; text-align: center; color: white; font-family: sans-serif; z-index: 10;">
        <h2 style="margin-top: 0; color: gold;">Graveyard Promotion</h2>
        <p>Select a fallen piece to resurrect:</p>
        <div style="display: flex; gap: 10px; justify-content: center; margin-bottom: 20px;">
            <button class="btn-rank" data-rank="queen" style="padding: 10px; font-size: 16px; cursor: pointer;">Queen</button>
            <button class="btn-rank" data-rank="knight" style="padding: 10px; font-size: 16px; cursor: pointer;">Knight</button>
            <button class="btn-rank" data-rank="rook" style="padding: 10px; font-size: 16px; cursor: pointer;">Rook</button>
            <button class="btn-rank" data-rank="bishop" style="padding: 10px; font-size: 16px; cursor: pointer;">Bishop</button>
            <button class="btn-rank" data-rank="pawn" style="background: #555; color: white;">Pawn (Reset)</button>
        </div>
        <button id="btn-cancel-promote" style="background: #ff4444; color: white; border: none; padding: 8px 16px; cursor: pointer; border-radius: 4px;">Cancel</button>
    </div>
    
    <script type="module" src="app.js"></script>
</body>
</html>
